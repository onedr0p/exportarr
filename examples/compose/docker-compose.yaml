---
version: "3.7"
# To keep API keys out of this file, use Docker secrets: mount the secret and
# point API_KEY_FILE at it instead of setting API_KEY, e.g.
#
#   services:
#     radarr-exporter:
#       environment:
#         API_KEY_FILE: /run/secrets/radarr_api_key
#       secrets:
#         - radarr_api_key
#   secrets:
#     radarr_api_key:
#       file: ./radarr_api_key.txt

services:
  sonarr-exporter:
    image: ghcr.io/onedr0p/exportarr:v2.0
    container_name: sonarr-exporter
    command: ["sonarr"]
    environment:
      PORT: 9707
      URL: "http://x.x.x.x:8989" # or; http://sonarr:8989
      API_KEY: "xxx"
    #    networks:
    #    - your_custom_network # optional
    ports:
      - "9707:9707"
    restart: unless-stopped
  radarr-exporter:
    image: ghcr.io/onedr0p/exportarr:v2.0
    container_name: radarr-exporter
    command: ["radarr"]
    environment:
      PORT: 9708
      URL: "http://x.x.x.x:7878" # or; http://radarr:7878
      API_KEY: "xxx"
    #    networks:
    #    - your_custom_network # optional
    ports:
      - "9708:9708"
    restart: unless-stopped
  lidarr-exporter:
    image: ghcr.io/onedr0p/exportarr:v2.0
    container_name: lidarr-exporter
    command: ["lidarr"]
    environment:
      PORT: 9709
      URL: "http://x.x.x.x:8686" # or; http://lidarr:8686
      API_KEY: "xxx"
    #    networks:
    #     - your_custom_network # optional
    ports:
      - "9709:9709"
    restart: unless-stopped
  prowlarr-exporter:
    image: ghcr.io/onedr0p/exportarr:v2.0
    container_name: prowlarr-exporter
    command: ["prowlarr"]
    environment:
      PORT: 9710
      URL: "http://x.x.x.x:9696" # or; http://prowlarr:8080
      API_KEY: "abc"
      # PROWLARR__BACKFILL: true # optional
      # PROWLARR__BACKFILL_SINCE_DATE: "2023-03-01" # optional
    #    networks:
    #     - your_custom_network # optional
    ports:
      - "9710:9710"
    restart: unless-stopped
  sabnzbd-exporter:
    image: ghcr.io/onedr0p/exportarr:v2.0
    container_name: sabnzbd-exporter
    command: ["sabnzbd"]
    environment:
      PORT: 9711
      URL: "http://x.x.x.x:8080" # or; http://sabnzbd:8080
      API_KEY: "abc"
    #    networks:
    #     - your_custom_network # optional
    ports:
      - "9711:9711"
    restart: unless-stopped
  bazarr-exporter:
    image: ghcr.io/onedr0p/exportarr:v2.0
    container_name: bazarr-exporter
    command: ["bazarr"]
    environment:
      PORT: 9712
      URL: "http://x.x.x.x:6767" # or; http://bazarr:6767
      API_KEY: "xxx"
    #    networks:
    #     - your_custom_network # optional
    ports:
      - "9712:9712"
    restart: unless-stopped
